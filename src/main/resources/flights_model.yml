# semanticdf YAML model definition — flights demo
#
# This mirrors the Scala DSL example (FlightsBasic) but in declarative YAML.
# Run via: mvn scala:run -DmainClass=io.semanticdf.examples.YamlFlightsExample
#
# Each top-level key is a model name. The 'table' field names a source DataFrame
# (resolved from the tables map or Spark metastore at load time).

flights:
    table: flights_tbl
    description: "Flight data with origin, destination, and metrics"

    dimensions:
        carrier:
            expr: carrier
            description: "Airline carrier code (IATA two-letter identifier)"
            metadata:
                owner: data-platform-team
                tags: [airline, identifier]
        origin:
            expr: origin
            description: "Origin airport code"
            metadata:
                owner: data-platform-team
                tags: [airport]

    measures:
        total_passengers:
            expr: "sum(passengers)"
            description: "Total passengers across all flights in the group"
            metadata:
                owner: analytics-team
                unit: count
                aggregation: sum
        flight_count:
            expr: "count(1)"
            description: "Number of flights (rows) in the group"
            metadata:
                owner: analytics-team
                unit: count
                aggregation: count
        total_distance:
            expr: "sum(distance)"
            description: "Total distance in miles across all flights"
            metadata:
                owner: analytics-team
                unit: miles
                aggregation: sum

    calculated_measures:
        avg_passengers:
            expr: "total_passengers / flight_count"
            description: "Average passengers per flight"
            metadata:
                owner: analytics-team
                unit: count
        avg_distance:
            expr: "total_distance / flight_count"
            description: "Average flight distance in miles"
            metadata:
                owner: analytics-team
                unit: miles
        pct_of_total:
            expr: "total_passengers / all(total_passengers)"
            description: |
                Fraction of total passengers. all() re-evaluates total_passengers at zero
                grain — avoids the classic BI trap where pct = sum(pct) > 100%.
            metadata:
                owner: analytics-team
                unit: ratio
                format: percent

carriers:
    table: carriers_tbl
    description: "Airline carrier reference data"

    dimensions:
        code: code
        name: name

    measures:
        carrier_count: "count(1)"

    # Joins are applied after all models exist (two-pass loading).
    # This demonstrates a join in the JOINED model rather than the base —
    # either direction works.
