name: CI

# Run on every push to master and on all pull requests.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (Spark ${{ matrix.spark }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - spark: "3.5.8"
            profile: ""
          - spark: "4.1.1"
            profile: "-Pspark4"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Show JDK version
        run: java -version

      - name: Run tests
        run: >-
          mvn test ${{ matrix.profile }}
          -Dmaven.test.failure.ignore=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-spark-${{ matrix.spark }}
          path: target/surefire-reports/
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-spark-${{ matrix.spark }}
          path: target/surefire-reports/TEST-*.xml
          retention-days: 14
