name: CI

# Run on every push to main and on all pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Spark ${{ matrix.spark }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - spark: "3.5.8"
            profile: ""
          - spark: "4.1.1"
            profile: "-Pspark4"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Show JDK version
        run: java -version

      - name: Run tests
        run: >-
          mvn test ${{ matrix.profile }}
          -Dmaven.test.failure.ignore=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-spark-${{ matrix.spark }}
          path: target/surefire-reports/
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-spark-${{ matrix.spark }}
          path: target/surefire-reports/TEST-*.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # OKF drift check — see Makefile and docs/agents/maintenance.md.
  # Fails the PR if docs/agents/reference/ is stale relative to examples/*/models.
  # ---------------------------------------------------------------------------
  okfgen-drift-check:
    name: OKF drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
      - name: Verify OKF bundle is in sync with YAMLs
        run: make okfgen-check
